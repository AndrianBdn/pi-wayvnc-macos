# Installed by pi-wayvnc-macos. Overrides ExecStart on wayvnc.service so the
# bundled wayvnc fork (with DES VNC-Auth) is used instead of /usr/bin/wayvnc.
# The empty ExecStart= line is required to clear the inherited value before
# the new one is appended.
[Service]
ExecStart=
ExecStart=/bin/sh /opt/pi-wayvnc-macos/bin/pi-wayvnc-macos-run.sh
